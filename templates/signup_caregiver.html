{% extends "base.html" %}
{% block title %}Sign Up — Caregiver{% endblock %}
{% block content %}

<h2>Sign Up — Caregiver</h2>

{% if error %}<div class="error-box">{{ error }}</div>{% endif %}

<form method="POST">
    <p>
        <label for="given_name">First Name:</label>
        <input id="given_name" name="given_name" required value="{{ form.given_name if form else '' }}">
    </p>
    <p>
        <label for="surname">Last Name:</label>
        <input id="surname" name="surname" required value="{{ form.surname if form else '' }}">
    </p>
    <p>
        <label for="email">Email:</label>
        <input id="email" name="email" type="email" required value="{{ form.email if form else '' }}">
    </p>
    <p>
        <label for="phone_number">Phone Number:</label>
        <input id="phone_number" name="phone_number" value="{{ form.phone_number if form else '' }}">
    </p>
    <p>
        <label for="city">City:</label>
        <input id="city" name="city" required value="{{ form.city if form else '' }}">
    </p>
    <p>
        <label for="caregiving_type">Type of Caregiving:</label>
        <select id="caregiving_type" name="caregiving_type" required>
            <option value="babysitter" {% if form and form.caregiving_type == 'babysitter' %}selected{% endif %}>Babysitter</option>
            <option value="elderly"    {% if form and form.caregiving_type == 'elderly'    %}selected{% endif %}>Elderly Care</option>
            <option value="playmate"   {% if form and form.caregiving_type == 'playmate'   %}selected{% endif %}>Playmate</option>
        </select>
    </p>
    <p>
        <label for="gender">Gender:</label>
        <select id="gender" name="gender" required>
            <option value="male"   {% if form and form.gender == 'male'   %}selected{% endif %}>Male</option>
            <option value="female" {% if form and form.gender == 'female' %}selected{% endif %}>Female</option>
            <option value="other"  {% if form and form.gender == 'other'  %}selected{% endif %}>Other</option>
        </select>
    </p>
    <p>
        <label for="hourly_rate">Price per Hour (KZT):</label>
        <input id="hourly_rate" name="hourly_rate" type="number" step="100" min="0" value="{{ form.hourly_rate if form else '' }}">
    </p>
    <p>
        <label for="profile_description">Biography:</label>
        <textarea id="profile_description" name="profile_description" rows="4">{{ form.profile_description if form else '' }}</textarea>
    </p>
    <p>
        <label for="password">Password:</label>
        <input id="password" name="password" type="password" required>
    </p>
    <p>
        <button type="submit">Create Account</button>
        <a href="/signup">Back</a>
    </p>
</form>

{% endblock %}
