{% extends "base.html" %}
{% block title %}Edit Address{% endblock %}
{% block content %}

<h2>Edit Address</h2>

<form method="POST">
    <p>
        <label for="house_number">House Number:</label><br>
        <input id="house_number" name="house_number" value="{{ address.house_number if address else '' }}">
    </p>
    <p>
        <label for="street">Street:</label><br>
        <input id="street" name="street" value="{{ address.street if address else '' }}">
    </p>
    <p>
        <label for="town">Town:</label><br>
        <input id="town" name="town" value="{{ address.town if address else '' }}">
    </p>
    <p>
        <button type="submit">Save</button>
        <a href="/addresses">Cancel</a>
    </p>
</form>

{% endblock %}
